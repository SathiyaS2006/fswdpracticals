<!DOCTYPE html>
<html ng-app="courseApp">
<head>
<title>Course Management System</title>

<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="app.js"></script>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:0;
}

/* Main container */
.container{
    width:60%;
    margin:80px auto;
    background:#ffffff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

/* Title */
h2{
    text-align:center;
    color:#ff4b7d;
    margin-bottom:20px;
}

h3{
    color:#5a4fcf;
    margin-top:30px;
}

/* Inputs */
input{
    padding:10px;
    margin:8px;
    border-radius:6px;
    border:1px solid #ccc;
    width:180px;
    transition:0.3s;
}

input:focus{
    border-color:#9fe3fc;
    outline:none;
    box-shadow:0 0 5px #40b5eb;
}

/* Buttons */
button{
    padding:10px 16px;
    background:linear-gradient(45deg,#ff4b7d,#ff7eb3);
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:linear-gradient(45deg,#ff2e63,#ff7eb3);
}

/* Delete button */
.delete-btn{
    background:linear-gradient(45deg,#ff4e50,#f00000);
}

.delete-btn:hover{
    background:linear-gradient(45deg,#ff0000,#ff6a6a);
}

/* Table */
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    border-radius:10px;
    overflow:hidden;
}

th{
    background:#f96c5c;
    color:white;
    padding:12px;
}

td{
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f4f5ff;
}

tr:nth-child(odd){
    background:#ffffff;
}

tr:hover{
    background:#ffe6f0;
    transition:0.3s;
}

</style>
</head>

<body ng-controller="CourseController">

<div class="container">

<h2>Course Management System</h2>

<form ng-submit="saveCourse()">

<input type="text" ng-model="course.name" placeholder="Student Name" required>
<input type="text" ng-model="course.course" placeholder="Course" required>
<input type="text" ng-model="course.duration" placeholder="Duration" required>
<input type="text" ng-model="course.instructor" placeholder="Instructor" required>

<button type="submit">Save</button>

</form>

<h3>Course List</h3>

<table>

<tr>
<th>Name</th>
<th>Course</th>
<th>Duration</th>
<th>Instructor</th>
<th>Actions</th>
</tr>

<tr ng-repeat="c in courses">

<td>{{c.name}}</td>
<td>{{c.course}}</td>
<td>{{c.duration}}</td>
<td>{{c.instructor}}</td>

<td>
<button ng-click="editCourse(c)">Edit</button>
<button class="delete-btn" ng-click="deleteCourse(c.id)">Delete</button>
</td>

</tr>

</table>

</div>

</body>
</html>
